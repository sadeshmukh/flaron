display_information:
  name: flarondev
  description: flarondev
  background_color: "#000000"
features:
  bot_user:
    display_name: flarondev
    always_online: false
  shortcuts:
    - name: Reveal Channels
      type: message
      callback_id: reveal_channels
      description: let there be light!
  slash_commands:
    - command: /dev-flaron
      description: flaron.halceon.dev
      should_escape: true
oauth_config:
  scopes:
    user:
      - search:read
    bot:
      - chat:write
      - channels:read
      - commands
      - groups:read
      - im:read
      - mpim:read
  pkce_enabled: false
settings:
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
  is_mcp_enabled: false
